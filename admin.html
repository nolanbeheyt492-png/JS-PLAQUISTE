<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espace Administration — JS Plaquiste</title>
<link rel="stylesheet" href="style.css">
<style>
  .admin-panel { max-width: 650px; margin: 60px auto; display: none; }
  .login-panel { max-width: 400px; margin: 100px auto; }
</style>
</head>
<body>

<header>
  <div class="nav wrap">
    <div class="brand">JS <span>PLAQUISTE</span></div>
    <div style="font-weight: 600; color: var(--accent);">Espace Admin</div>
  </div>
</header>

<div class="wrap">
  <div class="form-box login-panel" id="login-box">
    <h2 style="margin-bottom: 20px; text-align:center;">Connexion Admin</h2>
    <div class="form-group" style="margin-bottom: 15px;">
      <label for="admin-password">Mot de passe secret</label>
      <input type="password" id="admin-password" placeholder="Entrez le mot de passe">
    </div>
    <button onclick="verifierConnexion()" class="btn btn-primary" style="width:100%;">Se connecter</button>
    <p id="login-error" style="color: red; margin-top: 10px; text-align: center; display: none;">Mot de passe incorrect.</p>
  </div>

  <div class="form-box admin-panel" id="admin-box">
    <h2 style="margin-bottom: 10px;">Ajouter un nouveau chantier</h2>
    <p style="color: var(--text-muted); margin-bottom: 30px;">Le chantier sera visible par tout le monde instantanément sur internet.</p>
    
    <form id="add-project-form">
      <div class="form-grid">
        <div class="form-group form-group-full">
          <label for="project-title">Nom du chantier / Ville</label>
          <input type="text" id="project-title" required placeholder="Ex: Rénovation Salon — Lille">
        </div>
        <div class="form-group form-group-full">
          <label for="project-desc">Description des travaux</label>
          <textarea id="project-desc" rows="3" required placeholder="Ex: Pose de faux plafond suspendu avec bandes à joints..."></textarea>
        </div>
        <div class="form-group form-group-full">
          <label for="project-file">Photo du projet</label>
          <input type="file" id="project-file" accept="image/*" required>
        </div>
      </div>
      <button type="submit" id="submit-btn" class="btn btn-primary" style="width:100%; padding:16px; margin-top: 10px;">Publier le chantier sur le site</button>
    </form>
    
    <hr style="border: 0; border-top: 1px solid var(--border); margin: 40px 0;">
    <button onclick="deconnexion()" class="btn btn-outline" style="width: 100%;">Se déconnecter</button>
  </div>
</div>

<script>
  // Paramètres de connexion
  const MOT_DE_PASSE_SECRET = "plaquiste2026";
  
  // Tes identifiants Cloudinary connectés par mes soins
  const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/x39moqat/image/upload"; 
  const CLOUDINARY_PRESET = "js_preset"; 

  // Tes identifiants JSONBin connectés par mes soins
  const JSONBIN_BIN_ID = "6a5139ecf5f4af5e297e29e2"; 
  const JSONBIN_SECRET_KEY = "$2a$10$tZbeS4ZJbHqg0Y8zI5rbe.vWp11mK4Xv2D5MREI9x6C6HclB6/EWG"; // Clé d'accès requise en lecture/écriture

  function verifierConnexion() {
    const inputPass = document.getElementById('admin-password').value;
    const errorMsg = document.getElementById('login-error');
    if (inputPass === MOT_DE_PASSE_SECRET) {
      localStorage.setItem('js_admin_logged', 'true');
      afficherPanneau();
    } else {
      errorMsg.style.display = 'block';
    }
  }

  function afficherPanneau() {
    document.getElementById('login-box').style.display = 'none';
    document.getElementById('admin-box').style.display = 'block';
  }

  function deconnexion() {
    localStorage.removeItem('js_admin_logged');
    window.location.reload();
  }

  if (localStorage.getItem('js_admin_logged') === 'true') {
    afficherPanneau();
  }

  document.getElementById('add-project-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const submitBtn = document.getElementById('submit-btn');
    const title = document.getElementById('project-title').value;
    const desc = document.getElementById('project-desc').value;
    const fileInput = document.getElementById('project-file');
    
    if (fileInput.files && fileInput.files[0]) {
      submitBtn.textContent = "Publication en cours...";
      submitBtn.disabled = true;

      // 1. Envoi de l'image chez Cloudinary
      const formData = new FormData();
      formData.append('file', fileInput.files[0]);
      formData.append('upload_preset', CLOUDINARY_PRESET);

      fetch(CLOUDINARY_URL, { method: 'POST', body: formData })
      .then(res => res.json())
      .then(cloudinaryData => {
        if(cloudinaryData.secure_url) {
          
          // 2. Récupération des anciens chantiers sur JSONBin
          fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
            headers: { 'X-Master-Key': JSONBIN_SECRET_KEY }
          })
          .then(res => res.json())
          .then(binData => {
            // Lecture sécurisée du format "chantiers"
            let currentProjects = (binData.record && binData.record.chantiers) ? binData.record.chantiers : [];
            
            // Ajout du nouveau projet
            currentProjects.push({
              title: title,
              desc: desc,
              image: cloudinaryData.secure_url
            });

            // 3. Mise à jour globale sur la base de données
            fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
              method: 'PUT',
              headers: {
                'Content-Type': 'application/json',
                'X-Master-Key': JSONBIN_SECRET_KEY
              },
              body: JSON.stringify({ chantiers: currentProjects })
            })
            .then(() => {
              alert("Chantier publié sur internet avec succès !");
              window.location.href = 'index.html';
            });
          });

        } else {
          alert("Erreur Cloudinary. Vérifie le preset 'js_preset' (Unsigned).");
          submitBtn.textContent = "Publier le chantier sur le site";
          submitBtn.disabled = false;
        }
      })
      .catch(() => {
        alert("Erreur réseau globale.");
        submitBtn.textContent = "Publier le chantier sur le site";
        submitBtn.disabled = false;
      });
    }
  });
</script>
</body>
</html>
