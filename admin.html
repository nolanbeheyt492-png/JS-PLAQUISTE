<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espace Administration — JS Plaquiste</title>
<link rel="stylesheet" href="style.css">
<style>
  .admin-panel { max-width: 650px; margin: 60px auto; display: none; }
  .login-panel { max-width: 400px; margin: 100px auto; }
  .admin-project-list { margin-top: 40px; display: flex; flex-direction: column; gap: 16px; }
  .admin-project-item { display: flex; align-items: center; justify-content: space-between; background: var(--panel); border: 1px solid var(--border); padding: 16px; border-radius: var(--radius-md); gap: 16px; }
  .admin-project-item img { width: 80px; height: 60px; object-fit: cover; border-radius: 4px; }
  .btn-danger { background: #ef4444; color: white; padding: 8px 16px; font-size: 0.85rem; }
  .btn-danger:hover { background: #dc2626; }
</style>
</head>
<body>

<header>
  <div class="nav wrap">
    <div class="brand">JS <span>PLAQUISTE</span></div>
    <div style="font-weight: 600; color: var(--accent);">Espace Admin</div>
  </div>
</header>

<div class="wrap">
  <!-- 1. FORMULAIRE DE CONNEXION -->
  <div class="form-box login-panel" id="login-box">
    <h2 style="margin-bottom: 20px; text-align:center;">Connexion Admin</h2>
    <div class="form-group" style="margin-bottom: 15px;">
      <label for="admin-password">Mot de passe secret</label>
      <input type="password" id="admin-password" placeholder="Entrez le mot de passe">
    </div>
    <button onclick="verifierConnexion()" class="btn btn-primary" style="width:100%;">Se connecter</button>
    <p id="login-error" style="color: red; margin-top: 10px; text-align: center; display: none;">Mot de passe incorrect.</p>
  </div>

  <!-- 2. LE PANNEAU D'ADMINISTRATION -->
  <div class="form-box admin-panel" id="admin-box">
    <h2 style="margin-bottom: 10px;">Ajouter un nouveau chantier</h2>
    <p style="color: var(--text-muted); margin-bottom: 30px;">Le chantier sera visible par tout le monde instantanément sur internet.</p>
    
    <form id="add-project-form">
      <div class="form-grid">
        <div class="form-group form-group-full">
          <label for="project-title">Nom du chantier / Ville</label>
          <input type="text" id="project-title" required placeholder="Ex: Rénovation Salon — Lille">
        </div>
        <div class="form-group form-group-full">
          <label for="project-desc">Description des travaux</label>
          <textarea id="project-desc" rows="3" required placeholder="Ex: Pose de faux plafond suspendu avec bandes à joints..."></textarea>
        </div>
        <div class="form-group form-group-full">
          <label for="project-file">Photo du projet</label>
          <input type="file" id="project-file" accept="image/*" required>
        </div>
      </div>
      <button type="submit" id="submit-btn" class="btn btn-primary" style="width:100%; padding:16px; margin-top: 10px;">Publier le chantier sur le site</button>
    </form>
    
    <!-- NOUVELLE SECTION : LISTER ET SUPPRIMER LES PHOTOS -->
    <hr style="border: 0; border-top: 1px solid var(--border); margin: 40px 0;">
    <h3 style="margin-bottom: 15px;">Chantiers actuellement en ligne</h3>
    <div class="admin-project-list" id="admin-gallery">
      <p style="color: var(--text-muted);">Chargement de vos chantiers...</p>
    </div>

    <hr style="border: 0; border-top: 1px solid var(--border); margin: 40px 0;">
    <button onclick="deconnexion()" class="btn btn-outline" style="width: 100%;">Se déconnecter</button>
  </div>
</div>

<script>
  const MOT_DE_PASSE_SECRET = "plaquiste2026";
  const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/x39moqat/image/upload"; 
  const CLOUDINARY_PRESET = "js_preset"; 
  const JSONBIN_BIN_ID = "6a5139ecf5f4af5e297e29e2"; 
  const JSONBIN_SECRET_KEY = "$2a$10$tZbeS4ZJbHqg0Y8zI5rbe.vWp11mK4Xv2D5MREI9x6C6HclB6/EWG"; 

  let globalProjects = [];

  function verifierConnexion() {
    const inputPass = document.getElementById('admin-password').value;
    const errorMsg = document.getElementById('login-error');
    if (inputPass === MOT_DE_PASSE_SECRET) {
      localStorage.setItem('js_admin_logged', 'true');
      afficherPanneau();
    } else {
      errorMsg.style.display = 'block';
    }
  }

  function afficherPanneau() {
    document.getElementById('login-box').style.display = 'none';
    document.getElementById('admin-box').style.display = 'block';
    chargerChantiersAdmin();
  }

  function deconnexion() {
    localStorage.removeItem('js_admin_logged');
    window.location.reload();
  }

  if (localStorage.getItem('js_admin_logged') === 'true') {
    afficherPanneau();
  }

  // Charger et afficher les chantiers dans l'espace admin avec le bouton Supprimer
  function chargerChantiersAdmin() {
    const adminGallery = document.getElementById('admin-gallery');
    fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
      headers: { 'X-Master-Key': JSONBIN_SECRET_KEY }
    })
    .then(res => res.json())
    .then(binData => {
      globalProjects = (binData.record && binData.record.chantiers) ? binData.record.chantiers : [];
      if(globalProjects.length === 0) {
        adminGallery.innerHTML = "<p style='color: var(--text-muted);'>Aucun chantier en ligne pour le moment.</p>";
      } else {
        adminGallery.innerHTML = "";
        globalProjects.forEach((proj, index) => {
          adminGallery.innerHTML += `
            <div class="admin-project-item">
              <div style="display:flex; align-items:center; gap:16px;">
                <img src="${proj.image}" alt="">
                <div>
                  <h4 style="color:#0f172a; font-size:1rem;">${proj.title}</h4>
                </div>
              </div>
              <button onclick="supprimerChantier(${index})" class="btn btn-danger">Supprimer</button>
            </div>
          `;
        });
      }
    })
    .catch(() => { adminGallery.innerHTML = "<p style='color:red;'>Erreur de chargement.</p>"; });
  }

  // Fonction pour supprimer un chantier de la base de données globale
  function supprimerChantier(index) {
    if(confirm("Voulez-vous vraiment supprimer ce chantier du site ?")) {
      globalProjects.splice(index, 1); // Enlève l'élément du tableau
      
      fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'X-Master-Key': JSONBIN_SECRET_KEY
        },
        body: JSON.stringify({ chantiers: globalProjects })
      })
      .then(() => {
        alert("Chantier supprimé avec succès !");
        chargerChantiersAdmin(); // Recharge la liste de l'admin
      });
    }
  }

  // Ajouter un chantier
  document.getElementById('add-project-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const submitBtn = document.getElementById('submit-btn');
    const title = document.getElementById('project-title').value;
    const desc = document.getElementById('project-desc').value;
    const fileInput = document.getElementById('project-file');
    
    if (fileInput.files && fileInput.files[0]) {
      submitBtn.textContent = "Publication en cours...";
      submitBtn.disabled = true;

      const formData = new FormData();
      formData.append('file', fileInput.files[0]);
      formData.append('upload_preset', CLOUDINARY_PRESET);

      fetch(CLOUDINARY_URL, { method: 'POST', body: formData })
      .then(res => res.json())
      .then(cloudinaryData => {
        if(cloudinaryData.secure_url) {
          
          globalProjects.push({
            title: title,
            desc: desc,
            image: cloudinaryData.secure_url
          });

          fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              'X-Master-Key': JSONBIN_SECRET_KEY
            },
            body: JSON.stringify({ chantiers: globalProjects })
          })
          .then(() => {
            alert("Chantier publié avec succès !");
            document.getElementById('add-project-form').reset();
            submitBtn.textContent = "Publier le chantier sur le site";
            submitBtn.disabled = false;
            chargerChantiersAdmin();
          });

        } else {
          alert("Erreur Cloudinary.");
          submitBtn.disabled = false;
        }
      })
      .catch(() => {
        alert("Erreur réseau.");
        submitBtn.disabled = false;
      });
    }
  });
</script>
</body>
</html>
