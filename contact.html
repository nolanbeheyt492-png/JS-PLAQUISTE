<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demande de Devis — JS Plaquiste</title>
<link rel="stylesheet" href="style.css">
<style>
  /* Styles pour la boîte de remerciement qui apparaîtra après l'envoi */
  .merci-box {
    text-align: center;
    padding: 40px 20px;
  }
  .merci-icon {
    font-size: 3.5rem;
    color: var(--accent);
    margin-bottom: 24px;
  }
  .merci-box h1 {
    font-size: 2rem;
    font-weight: 800;
    margin-bottom: 16px;
  }
  .merci-box p {
    color: var(--text-muted);
    font-size: 1.1rem;
    line-height: 1.6;
  }
</style>
</head>
<body>

<header>
  <div class="nav wrap">
    <div class="brand">JS <span>PLAQUISTE</span></div>
    <ul id="nav-menu">
      <li><a href="index.html">Accueil</a></li>
      <li><a href="services.html">Nos Services</a></li>
      <li><a href="contact.html" class="active">Demander un Devis</a></li>
    </ul>
    <a href="contact.html" class="btn btn-primary header-btn">Devis sous 48h</a>
    <button class="menu-toggle" id="menu-btn">☰</button>
  </div>
</header>

<section class="section">
  <div class="wrap">
    <div class="section-head">
      <h2>Votre projet de rénovation</h2>
      <p>Une estimation claire, détaillée et entièrement gratuite sous 48 heures maximum.</p>
    </div>

    <!-- Cette boîte contient le formulaire OU le message de succès -->
    <div class="form-box" id="form-container">
      <form id="devis-form">
        
        <!-- Options de configuration FormSubmit -->
        <input type="hidden" name="_subject" value="Nouveau Devis JS Plaquiste !">
        <input type="hidden" name="_captcha" value="false">
        
        <div class="form-grid">
          <div class="form-group">
            <label for="nom">Nom / Prénom</label>
            <input type="text" id="nom" name="Nom" required placeholder="Ex: Jean Dupont">
          </div>
          <div class="form-group">
            <label for="tel">Téléphone</label>
            <input type="tel" id="tel" name="Telephone" required placeholder="Ex: 06 00 00 00 00">
          </div>
          <div class="form-group">
            <label for="ville">Lieu du projet</label>
            <input type="text" id="ville" name="Ville" required placeholder="Ex: Paris, Lille...">
          </div>
          <div class="form-group">
            <label for="surface">Superficie estimée (m²)</label>
            <input type="number" id="surface" name="Superficie_m2" placeholder="Ex: 60">
          </div>
          <div class="form-group form-group-full">
            <label for="type-bien">Type de bien</label>
            <select id="type-bien" name="Type_de_bien" required>
              <option value="">Sélectionnez...</option>
              <option value="maison">Maison</option>
              <option value="appartement">Appartement</option>
              <option value="commercial">Local Commercial / Bureau</option>
            </select>
          </div>
          <div class="form-group form-group-full">
            <label for="msg">Description de vos besoins</label>
            <textarea id="msg" name="Message" rows="5" required placeholder="Décrivez votre projet (ex: Doublage de murs, création d'un faux plafond...)"></textarea>
          </div>
        </div>
        <button type="submit" id="submit-btn" class="btn btn-primary" style="width:100%; padding:16px;">Envoyer ma demande de devis</button>
      </form>
    </div>
  </div>
</section>

<footer>
  <div class="wrap footer-wrap">
    <div>© <span id="year"></span> JS Plaquiste.</div>
    <div>Contact : beheytnolan@gmail.com</div>
  </div>
</footer>

<script>
  // Script pour l'année et le menu mobile
  document.getElementById('year').textContent = new Date().getFullYear();
  const menuBtn = document.getElementById('menu-btn');
  const navMenu = document.getElementById('nav-menu');
  menuBtn.addEventListener('click', () => { navMenu.classList.toggle('active'); });

  // Script pour envoyer le formulaire sans recharger ni rediriger la page
  const form = document.getElementById('devis-form');
  const formContainer = document.getElementById('form-container');
  const submitBtn = document.getElementById('submit-btn');

  form.addEventListener('submit', function(e) {
    e.preventDefault(); // Bloque la redirection automatique
    
    // Change le texte du bouton pendant l'envoi
    submitBtn.textContent = "Envoi en cours...";
    submitBtn.disabled = true;

    const formData = new FormData(form);

    // Envoi transparent à FormSubmit
    fetch("https://formsubmit.co/ajax/beheytnolan@gmail.com", {
        method: "POST",
        body: formData,
        headers: {
            'Accept': 'application/json'
        }
    })
    .then(response => {
        if (response.ok) {
            // Remplace le formulaire par ton message de remerciement personnalisé (sans Nolan)
            formContainer.innerHTML = `
              <div class="merci-box">
                <div class="merci-icon">✓</div>
                <h1>Demande bien reçue !</h1>
                <p>Votre demande de devis a été transmise avec succès.<br>Nous étudions vos besoins et nous vous recontactons <strong>sous 48 heures maximum</strong>.</p>
              </div>
            `;
        } else {
            alert("Une erreur est survenue. Veuillez réessayer.");
            submitBtn.textContent = "Envoyer ma demande de devis";
            submitBtn.disabled = false;
        }
    })
    .catch(error => {
        alert("Erreur de connexion. Vérifiez votre réseau.");
        submitBtn.textContent = "Envoyer ma demande de devis";
        submitBtn.disabled = false;
    });
  });
</script>
</body>
</html>
