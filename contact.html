<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demande de Devis — JS Plaquiste</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="nav wrap">
    <div class="brand">JS <span>PLAQUISTE</span></div>
    <ul id="nav-menu">
      <li><a href="index.html">Accueil</a></li>
      <li><a href="services.html">Nos Services</a></li>
      <li><a href="contact.html" class="active">Demander un Devis</a></li>
    </ul>
    <a href="contact.html" class="btn btn-primary" style="padding:8px 16px; font-size:0.85rem;">Devis sous 48h</a>
    <button class="menu-toggle" id="menu-btn">☰</button>
  </div>
</header>

<section class="section">
  <div class="wrap">
    <div class="section-head">
      <h2>Votre projet de rénovation</h2>
      <p>Une estimation claire, détaillée et entièrement gratuite sous 48 heures maximum.</p>
    </div>

    <!-- Zone du formulaire ou du message de succès -->
    <div class="form-box" id="contact-zone">
      <!-- Ajout des attributs action et method par sécurité si le JS est bloqué -->
      <form id="devis-form" action="https://formsubmit.co/ajax/beheytnolan@gmail.com" method="POST">
        
        <div class="form-grid">
          <div class="form-group">
            <label for="nom">Nom / Prénom</label>
            <input type="text" id="nom" name="Nom" required placeholder="Ex: Jean Dupont">
          </div>
          <div class="form-group">
            <label for="tel">Téléphone</label>
            <input type="tel" id="tel" name="Telephone" required placeholder="Ex: 06 00 00 00 00">
          </div>
          <div class="form-group">
            <label for="ville">Lieu du projet</label>
            <input type="text" id="ville" name="Ville" required placeholder="Ex: Paris, Lille...">
          </div>
          <div class="form-group">
            <label for="surface">Superficie estimée (m²)</label>
            <input type="number" id="surface" name="Superficie_m2" placeholder="Ex: 60">
          </div>
          <div class="form-group form-group-full">
            <label for="type-bien">Type de bien</label>
            <select id="type-bien" name="Type_de_bien" required>
              <option value="">Sélectionnez...</option>
              <option value="maison">Maison</option>
              <option value="appartement">Appartement</option>
              <option value="commercial">Local Commercial / Bureau</option>
            </select>
          </div>
          <div class="form-group form-group-full">
            <label for="msg">Description de vos besoins</label>
            <textarea id="msg" name="Message" rows="5" required placeholder="Décrivez votre projet (ex: Doublage de murs, création d'un faux plafond...)"></textarea>
          </div>
        </div>
        <button type="submit" id="submit-btn" class="btn btn-primary" style="width:100%; padding:16px;">Envoyer ma demande de devis</button>
      </form>
    </div>
  </div>
</section>

<footer>
  <div class="wrap footer-wrap">
    <div>© <span id="year"></span> JS Plaquiste.</div>
    <div>Contact : beheytnolan@gmail.com</div>
  </div>
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();
  
  // Menu Mobile
  const menuBtn = document.getElementById('menu-btn');
  const navMenu = document.getElementById('nav-menu');
  menuBtn.addEventListener('click', () => { navMenu.classList.toggle('active'); });

  // Envoi du formulaire via AJAX propre
  document.getElementById('devis-form').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const btn = document.getElementById('submit-btn');
    const zone = document.getElementById('contact-zone');
    btn.innerText = "Envoi en cours...";
    btn.disabled = true;

    // Récupération correcte des champs du formulaire
    const formData = new FormData(this);

    // Envoi masqué avec les bons en-têtes pour FormSubmit AJAX
    fetch("https://formsubmit.co/ajax/beheytnolan@gmail.com", {
        method: "POST",
        headers: { 
            'Accept': 'application/json'
        },
        body: formData
    })
    .then(response => {
        if (response.ok) {
            // Le mail est parti, on affiche TON beau message de confirmation sans bouger
            zone.innerHTML = `
              <div style="text-align: center; padding: 20px;">
                <div style="font-size: 3.5rem; color: var(--accent); margin-bottom: 20px;">✓</div>
                <h3 style="font-size: 1.8rem; margin-bottom: 12px; font-weight:800;">Demande bien reçue !</h3>
                <p style="color: var(--text-muted); font-size: 1.1rem; line-height: 1.6; margin-bottom: 24px;">
                  Merci Nolan, votre demande de devis a été transmise avec succès.<br>
                  Nous étudions vos besoins et nous vous recontactons <strong>sous 48 heures maximum</strong>.
                </p>
                <a href="index.html" class="btn btn-outline">Retour à l'accueil</a>
              </div>
            `;
        } else {
            throw new Error('Erreur serveur');
        }
    })
    .catch(error => {
        btn.innerText = "Erreur, réessayez";
        btn.disabled = false;
        alert("Un problème est survenu lors de l'envoi. Vérifiez votre connexion.");
    });
  });
</script>
</body>
</html>
