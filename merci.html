<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merci pour votre demande — JS Plaquiste</title>
<link rel="stylesheet" href="style.css">
<style>
  .merci-box {
    max-width: 600px;
    margin: 100px auto;
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 60px 40px;
    border-radius: var(--radius-lg);
    text-align: center;
  }
  .merci-icon {
    font-size: 3.5rem;
    color: var(--accent);
    margin-bottom: 24px;
  }
  .merci-box h1 {
    font-size: 2rem;
    font-weight: 800;
    margin-bottom: 16px;
  }
  .merci-box p {
    color: var(--text-muted);
    font-size: 1.1rem;
    margin-bottom: 32px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<header>
  <div class="nav wrap">
    <div class="brand">JS <span>PLAQUISTE</span></div>
    <ul id="nav-menu">
      <li><a href="index.html">Accueil</a></li>
      <li><a href="services.html">Nos Services</a></li>
      <li><a href="contact.html">Demander un Devis</a></li>
    </ul>
    <button class="menu-toggle" id="menu-btn">☰</button>
  </div>
</header>

<div class="wrap">
  <div class="merci-box">
    <div class="merci-icon">✓</div>
    <h1>Demande bien reçue !</h1>
    <p>Votre demande de devis a été transmise avec succès.<br>Nous étudions vos besoins et nous vous recontactons <strong>sous 48 heures maximum</strong>.</p>
    <a href="index.html" class="btn btn-primary">Retour à l'accueil</a>
  </div>
</div>

<footer>
  <div class="wrap footer-wrap">
    <div>© <span id="year"></span> JS Plaquiste. Tous travaux de second œuvre.</div>
  </div>
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();
  const menuBtn = document.getElementById('menu-btn');
  const navMenu = document.getElementById('nav-menu');
  menuBtn.addEventListener('click', () => { navMenu.classList.toggle('active'); });
</script>
</body>
</html>
